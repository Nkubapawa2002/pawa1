<!doctype html>
<html lang="en">
<head>
  <script src="js/theme.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Daily services near you — Pawa</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.css" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a6f4d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-maskable.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/mobile.css" />
  <link rel="stylesheet" href="css/premium.css" />
  <link rel="stylesheet" href="css/claude-design.css" />
  <link rel="stylesheet" href="css/houses-pro.css" />
  <link rel="stylesheet" href="css/neon-pro.css" />
  <link rel="stylesheet" href="css/design-system.css" />

  <style>
    .svc-toolbar {
      background: var(--c-surface, #fff); border: 1px solid var(--c-border, #e7e4dd);
      border-radius: 14px; padding: 12px; margin-bottom: 14px;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px;
    }
    .svc-toolbar select, .svc-toolbar input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--c-border, #e7e4dd);
      border-radius: 10px; font-size: 16px; font-family: inherit; background: #fff; color: var(--c-text, #1a1915);
    }
    .svc-actions { display: flex; gap: 8px; grid-column: 1 / -1; flex-wrap: wrap; }
    .svc-near-me {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border: none;
      border-radius: 10px; cursor: pointer; background: var(--c-brand, #0a6f4d); color: #fff; font-weight: 700; font-size: .9rem;
    }
    .svc-near-me svg { width: 18px; height: 18px; }
    .svc-near-me:disabled { opacity: .6; cursor: default; }
    .svc-list-cta {
      margin-left: auto; display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px;
      border-radius: 10px; font-weight: 700; font-size: .9rem; background: var(--c-accent, #bc5c00); color: #fff; text-decoration: none;
    }
    .svc-result-count { font-size: .9rem; color: var(--c-muted, #6b6960); margin: 6px 2px 10px; }
    .svc-mobile-tabs { display: none; gap: 8px; margin-bottom: 10px; }
    .svc-mobile-tabs button {
      flex: 1; padding: 10px; border: 1px solid var(--c-border, #e7e4dd); background: #fff;
      border-radius: 10px; font-weight: 700; cursor: pointer; color: var(--c-text,#1a1915);
    }
    .svc-mobile-tabs button.active { background: var(--c-brand, #0a6f4d); color: #fff; border-color: transparent; }
    .svc-stage { display: grid; grid-template-columns: 1.15fr .85fr; gap: 14px; align-items: start; }
    .svc-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
    .svc-map-wrap { position: sticky; top: 14px; }
    .svc-map { height: 72vh; min-height: 420px; border-radius: 14px; overflow: hidden; border: 1px solid var(--c-border, #e7e4dd); }

    /* Category chip rail — one-tap filtering */
    .svc-chips {
      display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 10px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .svc-chips::-webkit-scrollbar { display: none; }
    .svc-chip {
      flex: 0 0 auto; padding: 8px 14px; border-radius: 999px; cursor: pointer;
      border: 1px solid var(--c-border, #e7e4dd); background: var(--c-surface, #fff);
      color: var(--c-text, #1a1915); font-weight: 700; font-size: .85rem; white-space: nowrap;
      transition: background .12s ease, color .12s ease, transform .12s ease;
    }
    .svc-chip:hover { transform: translateY(-1px); }
    .svc-chip.active { background: var(--c-brand, #0a6f4d); color: #fff; border-color: transparent; }

    .svc-card {
      background: var(--c-surface, #fff); border: 1px solid var(--c-border, #e7e4dd);
      border-radius: 14px; overflow: hidden;
      color: var(--c-text, #1a1915);
      display: flex; flex-direction: column; transition: transform .12s ease, box-shadow .12s ease;
    }
    .svc-card-link { display: flex; flex-direction: column; text-decoration: none; color: inherit; cursor: pointer; flex: 1; }
    .svc-card-title { color: var(--c-text, #1a1915); }
    .svc-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,.12); }

    /* Quick actions: Call / WhatsApp / draw the real road Route */
    .svc-card-actions {
      display: flex; gap: 6px; padding: 0 11px 12px; margin-top: auto;
    }
    .sca-btn {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      padding: 8px 6px; border-radius: 9px; font-weight: 700; font-size: .76rem;
      text-decoration: none; border: none; cursor: pointer; white-space: nowrap;
      transition: filter .12s ease;
    }
    .sca-btn:hover { filter: brightness(1.08); }
    .sca-btn.call  { background: var(--c-brand, #0a6f4d); color: #fff; }
    .sca-btn.wa    { background: #1fa855; color: #fff; }
    .sca-btn.route { background: var(--c-surface-2, #f3f1ea); color: var(--c-text, #1a1915); border: 1px solid var(--c-border, #e7e4dd); }
    .svc-card-photo { position: relative; aspect-ratio: 4 / 3; background: #eceae4 center/cover no-repeat; }
    .svc-card-badges { position: absolute; top: 8px; left: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
    .sc-badge { font-size: .68rem; font-weight: 800; letter-spacing: .3px; padding: 3px 8px; border-radius: 999px; color: #fff; background: rgba(0,0,0,.55); backdrop-filter: blur(3px); }
    .sc-badge.verified { background: var(--c-success, #0d8050); }
    .sc-badge.dist { background: rgba(0,0,0,.55); }
    .sc-badge.dist.road { background: var(--c-brand, #0a6f4d); }   /* exact road km + min */
    .sc-badge.cat { background: var(--c-accent, #bc5c00); }
    .svc-card-body { padding: 11px 13px 13px; display: flex; flex-direction: column; gap: 5px; }
    .svc-card-price { font-weight: 800; color: var(--c-brand, #0a6f4d); font-size: 1.02rem; }
    .svc-card-price small { font-weight: 600; color: var(--c-muted, #6b6960); font-size: .72rem; }
    .svc-card-title { font-weight: 700; font-size: .92rem; line-height: 1.25; }
    .svc-card-meta { font-size: .8rem; color: var(--c-muted, #6b6960); display: flex; flex-wrap: wrap; gap: 4px 10px; }
    .svc-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .svc-card-tags span { font-size: .68rem; font-weight: 600; padding: 2px 7px; border-radius: 999px; background: var(--c-surface-2, #f3f1ea); color: var(--c-muted, #555); }
    .svc-empty { padding: 40px 16px; text-align: center; color: var(--c-muted, #6b6960); }

    @media (max-width: 860px) {
      .svc-stage { grid-template-columns: 1fr; }
      .svc-mobile-tabs { display: flex; }
      /* compact 2-col toolbar so filters don't tower over the list */
      .svc-toolbar { grid-template-columns: 1fr 1fr; padding: 10px; gap: 7px; }
      .svc-toolbar select, .svc-toolbar input { padding: 9px 10px; font-size: 15px; }
      #filterSearch { grid-column: 1 / -1; }
      .svc-stage[data-view="list"] .svc-map-wrap { display: none; }
      .svc-stage[data-view="map"] .svc-list { display: none; }
      .svc-map-wrap { position: static; }
      .svc-map { height: 64vh; }
      .svc-list-cta { margin-left: 0; }
    }
  </style>

  <!-- Plus Jakarta Sans — the Twilight-design app typeface -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
  <style>
    /* Twilight dark re-skin (Claude design) for the Services directory (Explore tab).
       Token-driven; the few hardcoded-white controls + low-contrast bright fills
       are fixed explicitly. */
    body[data-page="services"] {
      --c-surface: #141A18; --c-surface-2: rgba(255,255,255,.05); --c-bg-elev: rgba(255,255,255,.04);
      --c-border: rgba(255,255,255,.08);
      --c-text: #E9F3EE; --c-muted: rgba(233,243,238,.55);
      --c-brand: #2EE6A6; --c-brand-deep: #2EE6A6; --c-accent: #F6C45A; --c-success: #2EE6A6;
      background: radial-gradient(1100px 760px at 50% -10%, #13241D 0%, #0a120e 60%, #050806 100%);
      color: #E9F3EE; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; min-height: 100vh;
    }
    body[data-page="services"] .page-hero { background: linear-gradient(180deg, #10231b, #0a120e) !important; min-height: auto !important; padding: 26px 16px 10px !important; }
    body[data-page="services"] .page-title { color: #fff; }
    body[data-page="services"] .page-subtitle { color: rgba(233,243,238,.7); }
    body[data-page="services"] .container { padding-bottom: 96px; }
    body[data-page="services"] .svc-toolbar select,
    body[data-page="services"] .svc-toolbar input { background: rgba(255,255,255,.05); color: #E9F3EE; border-color: rgba(255,255,255,.14); }
    body[data-page="services"] .svc-toolbar input::placeholder { color: rgba(233,243,238,.4); }
    body[data-page="services"] .svc-mobile-tabs button:not(.active) { background: rgba(255,255,255,.05); color: #E9F3EE; border-color: rgba(255,255,255,.14); }
    body[data-page="services"] .svc-card-photo { background: #0f1714 center/cover no-repeat; }
    /* dark text on the bright green/gold fills for AA contrast */
    body[data-page="services"] .svc-near-me,
    body[data-page="services"] .svc-list-cta,
    body[data-page="services"] .svc-mobile-tabs button.active,
    body[data-page="services"] .svc-chip.active,
    body[data-page="services"] .sca-btn.call,
    body[data-page="services"] .sc-badge.verified,
    body[data-page="services"] .sc-badge.cat,
    body[data-page="services"] .sc-badge.dist.road { color: #06170F; }
    body[data-page="services"] #nav-slot, body[data-page="services"] #footer-slot { display: none !important; }
  </style>
  <link rel="stylesheet" href="css/theme-light.css" />
</head>
<body data-houses-pro data-page="services" data-app-shell="services.html">
  <div id="nav-slot"></div>

  <section class="page-hero" style="background-image:url('https://kkdpacoiwntrcukgwksh.supabase.co/storage/v1/object/public/site-photos/zach-rowlandson-qhK0hRwKU60-unsplash.jpg')">
    <div class="page-hero-inner">
      <img class="page-hero-icon" src="https://kkdpacoiwntrcukgwksh.supabase.co/storage/v1/object/public/site-photos/service-icon.png" alt="" width="60" height="60"
           style="display:block;margin:0 auto 8px;width:60px;height:60px;object-fit:contain;filter:drop-shadow(0 4px 14px rgba(0,0,0,.45));" />
      <h1 class="page-title">Daily services near you</h1>
      <p class="page-subtitle">Find trusted local help — cleaning, plumbing, electrical, cooking, tutoring, beauty and more. Filter by category and area, or sort by distance.</p>
    </div>
  </section>

  <main id="servicesMain" class="container" style="padding-top:18px;">

    <!-- Find-mode prompt: near me (GPS) vs a specific/far area (type it) -->
    <div class="find-mode" id="fmServices" data-near="svcNearMeBtn" data-area="filterArea" style="display:none">
      <button class="fm-x" type="button" aria-label="Dismiss">&times;</button>
      <div class="fm-q">How do you want to find a service?</div>
      <div class="fm-actions">
        <button type="button" class="fm-btn fm-near"> Near me<small>Show the providers closest to me right now</small></button>
        <button type="button" class="fm-btn fm-area"> A specific area<small>Type a town, district or ward — browse anywhere in Tanzania</small></button>
      </div>
    </div>

    <!-- One-tap category rail (synced with the Category select below) -->
    <div class="svc-chips" id="svcChips" role="tablist" aria-label="Service categories"></div>

    <div class="svc-toolbar">
      <select id="filterCategory">
        <option value="">Category: any</option>
        <option value="cleaning"> Cleaning</option>
        <option value="plumbing"> Plumbing</option>
        <option value="electrical"> Electrical</option>
        <option value="carpentry"> Carpentry</option>
        <option value="painting"> Painting</option>
        <option value="gardening"> Gardening</option>
        <option value="moving_help"> Moving help</option>
        <option value="laundry"> Laundry</option>
        <option value="cooking"> Cooking / Chef</option>
        <option value="tutoring"> Tutoring</option>
        <option value="beauty"> Beauty & Salon</option>
        <option value="security"> Security</option>
        <option value="childcare"> Childcare</option>
        <option value="appliance_repair"> Appliance repair</option>
        <option value="other"> Other</option>
      </select>
      <input type="text" id="filterArea" list="filterAreaList" autocomplete="off"
             placeholder="Area — type e.g. Mikocheni, Sakina…" title="Type any area, ward or neighbourhood" />
      <datalist id="filterAreaList"></datalist>
      <select id="filterService">
        <option value="">Coverage: any</option>
        <option value="within_city">Within city</option>
        <option value="region_wide">Region-wide</option>
        <option value="cross_region">Cross-region</option>
      </select>
      <select id="filterRate">
        <option value="">Rate: any</option>
        <option value="hourly">Hourly</option>
        <option value="daily">Daily</option>
        <option value="per_job">Per job</option>
        <option value="monthly">Monthly</option>
      </select>
      <input type="text" id="filterSearch" placeholder="Search service, area or provider…" />
      <select id="svcSort" title="Sort providers">
        <option value="nearest">Sort: nearest</option>
        <option value="cheapest">Sort: cheapest</option>
        <option value="newest">Sort: newest</option>
      </select>
      <div class="svc-actions">
        <button id="svcNearMeBtn" class="svc-near-me" title="Use my GPS location">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          <span>Near me</span>
        </button>
        <a href="agent-services.html" class="svc-list-cta">+ Offer your service</a>
      </div>
    </div>

    <div id="servicesCount" class="svc-result-count" role="status" aria-live="polite"></div>

    <div class="svc-mobile-tabs">
      <button id="tabList" class="active" type="button">List</button>
      <button id="tabMap"  type="button">Map</button>
    </div>

    <div class="svc-stage" id="servicesStage" data-view="list">
      <div id="servicesList" class="svc-list" aria-busy="true"></div>
      <div class="svc-map-wrap">
        <div id="servicesMap" class="svc-map"></div>
      </div>
    </div>

  </main>

  <div id="footer-slot"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/geolocate.js"></script>
  <script src="js/find-mode.js"></script>
  <script src="js/services.js"></script>
  <script>
    // Pure app-shell: in-app bottom tab bar (js/app-shell.js) — "Explore" tab.
    window.applyTranslations();
    window.initServicesPage();
  </script>

  <script src="js/app-shell.js"></script>
  <script src="js/sw-register.js"></script>
  <script src="js/premium.js" defer></script>
</body>
</html>
