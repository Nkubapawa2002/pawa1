<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Share location — Maisha na Lifeza</title>
  <link rel="icon" href="icons/icon-maskable.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#0a120e" />
  <!-- Plus Jakarta Sans — the Twilight-design app typeface -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
  <style>
    /* Twilight design (Claude) — dark emerald, mint accent, glass card. */
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Plus Jakarta Sans', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #E9F3EE; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
      background: radial-gradient(1100px 760px at 50% -10%, #13241D 0%, #0a120e 60%, #050806 100%);
    }
    .sl-card {
      background: rgba(255,255,255,.04); color: #E9F3EE; max-width: 420px; width: 100%; border-radius: 22px;
      padding: 30px 24px; text-align: center;
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 26px 64px rgba(0,0,0,.5);
      -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    }
    .sl-card h1 { font-size: 1.3rem; font-weight: 700; margin: 6px 0 6px; color: #fff; }
    .sl-card p { color: rgba(233,243,238,.6); font-size: .95rem; line-height: 1.5; margin: 0 0 18px; }
    .sl-card p strong { color: #E9F3EE; }
    #slBtn {
      width: 100%; padding: 16px; border: 0; border-radius: 14px;
      background: #2EE6A6; color: #06170F; font-family: inherit;
      font-size: 1.05rem; font-weight: 800; cursor: pointer;
      box-shadow: 0 12px 28px rgba(46,230,166,.28);
    }
    #slBtn:disabled { opacity: .6; }
    #slStatus { margin-top: 14px; font-size: .92rem; min-height: 1.2em; color: #2EE6A6; font-weight: 600; }
    .sl-emoji { font-size: 2.4rem; }
  </style>
</head>
<body>
  <div class="sl-card">
    <div class="sl-emoji"></div>
    <h1>Share this place's location</h1>
    <p>An agent is registering this house. Tap the button below <strong>while you are at the property</strong> to send its exact location. Nothing else is shared.</p>
    <button id="slBtn" type="button">Share my current location</button>
    <div id="slStatus"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/share-location.js"></script>
</body>
</html>
