# Keep the Render free-tier gateways awake.
#
# Render's free plan sleeps a web service after ~15 min idle, and a cold wake
# takes ~30–50 s. We keep two services warm:
#   • pawa-map-gateway   (services/go)     — geocode/boundary lookups. A cold one
#     gets bypassed (the frontend times out and calls Nominatim directly, losing
#     the shared cache + rate limit), so warmth keeps it the real path.
#   • pawa-video-gateway (services/python) — house-video faststart remux. A cold
#     one means uploads fall back to the un-optimised original; warmth means new
#     videos get remuxed so they stream without stutter.
# Pinging /health on a schedule keeps both warm. Free: GitHub-hosted runner, no
# secrets.
#
# Note: scheduled workflows can be delayed under GitHub load and are disabled
# automatically after 60 days with no repo activity — re-enable from the Actions
# tab if that happens. The ~10 min cadence stays under Render's 15 min sleep.

name: Keep gateways warm

on:
  schedule:
    # Every 10 minutes (under Render's ~15 min idle-sleep threshold).
    - cron: "*/10 * * * *"
  workflow_dispatch: {}        # allow manual "Run workflow" from the Actions tab

# If a previous ping is somehow still running, don't stack another on top.
concurrency:
  group: keep-gateway-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health on each gateway (tolerate cold-start latency)
        run: |
          URLS="
          https://pawa-map-gateway.onrender.com/health
          https://pawa-video-gateway-oymf.onrender.com/health
          "
          rc=0
          for URL in $URLS; do
            echo "Pinging $URL"
            # --max-time 90 outlasts a cold spin-up; --retry covers a flaky wake.
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
                     --max-time 90 --retry 2 --retry-delay 10 --retry-all-errors \
                     "$URL") || true
            echo "  HTTP $code"
            # A wake attempt that returns anything keeps it warm; only a total
            # failure (000 = unreachable) on any gateway fails the run.
            [ "$code" = "000" ] && rc=1
          done
          exit $rc
