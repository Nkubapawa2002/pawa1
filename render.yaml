# Render blueprint for the Pawa map gateway (services/go).
#
# Render serves the static frontend via GitHub Pages already; this deploys ONLY
# the Go geocoding/boundary gateway as an HTTPS web service so the live site can
# call it (browsers block plain-HTTP calls from an HTTPS page).
#
# Two ways to use this:
#   A) Blueprint  — Render Dashboard → New + → Blueprint → pick the pawa1 repo.
#      Render reads this file and creates the service automatically.
#   B) Manual     — New + → Web Service → pick pawa1 → Root Directory: services/go
#      (Render auto-detects the Dockerfile). This file is then optional.
#
# Free plan note: the instance sleeps after ~15 min idle, so the first request
# after a quiet spell is slow. The frontend (js/geo.js) falls back to calling
# Nominatim directly whenever the gateway is slow/unreachable, so the map keeps
# working either way — the gateway just makes it faster and politer when warm.

services:
  - type: web
    name: pawa-map-gateway
    runtime: docker
    repo: https://github.com/Nkubapawa2002/pawa1
    branch: main
    rootDir: services/go
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt        # closest free Render region to Tanzania
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # LocationIQ (hosted Nominatim) API key. REQUIRED in production: the public
      # Nominatim server 429s this box's shared free-tier IP, so without a key the
      # map's place search/boundary lookups fail. Get a free key (5k/day) at
      # locationiq.com and set the value in the Render dashboard (kept secret).
      # Unset → the gateway falls back to public Nominatim (dev/self-host only).
      - key: LOCATIONIQ_KEY
        sync: false

  # Python service: AI search brain + video faststart remux (ffmpeg). The
  # houses uploader (js/agent-houses.js) POSTs each video here before storing it,
  # so the MP4 streams without stutter. Bytes-in → bytes-out: no Supabase creds
  # live here. Free plan sleeps after ~15 min idle; the uploader warms it when
  # the new-listing form opens and falls back to the original file if it's cold.
  - type: web
    name: pawa-video-gateway
    runtime: docker
    repo: https://github.com/Nkubapawa2002/pawa1
    branch: main
    rootDir: services/python
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true
