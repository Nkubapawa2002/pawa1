<!doctype html>
<html lang="en">
<head>
  <script src="js/theme.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Property — Pawa Houses</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a6f4d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-maskable.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/mobile.css" />
  <link rel="stylesheet" href="css/premium.css" />
  <link rel="stylesheet" href="css/claude-design.css" />
  <link rel="stylesheet" href="css/houses-pro.css" />
  <link rel="stylesheet" href="css/neon-pro.css" />
  <link rel="stylesheet" href="css/design-system.css" />

  <style>
    /* =====================================================================
       House detail page — single property, photo + map + agent + CTAs
       ===================================================================== */

    .hd-wrap { max-width: 1080px; margin: 0 auto; padding: 18px 16px 120px; }

    /* Back to listings */
    .hd-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--c-brand-deep, #064a33);
      font-weight: 600; font-size: .92rem;
      text-decoration: none;
      padding: 6px 12px;
      background: var(--c-surface, #fff);
      border: 1px solid var(--c-border, #e7e4dd);
      border-radius: 999px;
      margin-bottom: 14px;
    }
    .hd-back:hover { background: var(--c-brand-faint, #f0f7f2); border-color: var(--c-brand, #0a6f4d); text-decoration: none; }

    /* Hero photo (full width) */
    .hd-hero {
      position: relative;
      height: 360px;
      border-radius: 18px;
      overflow: hidden;
      background: #ece9e1 center/cover no-repeat;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      margin-bottom: 18px;
    }
    .hd-hero-badges {
      position: absolute; top: 14px; left: 14px;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .hd-badge {
      background: rgba(255,255,255,.95);
      color: var(--c-brand-deep, #064a33);
      padding: 5px 12px;
      border-radius: 999px;
      font-size: .76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      backdrop-filter: blur(8px);
    }
    .hd-badge.verified { background: var(--c-success, #0d8050); color: #fff; }
    .hd-badge.type-plot     { background: #6b3aa3; color: #fff; }
    .hd-badge.type-office   { background: #1e40af; color: #fff; }

    .hd-hero-actions {
      position: absolute; top: 14px; right: 14px;
      display: flex; gap: 6px;
    }
    .hd-icon-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,.95);
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--c-brand-deep, #064a33);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .hd-icon-btn:active { transform: scale(.94); }
    .hd-icon-btn.fav-active { color: var(--c-danger, #b91c1c); }

    /* Header block (title + price) */
    .hd-header {
      background: var(--c-surface, #fff);
      border: 1px solid var(--c-border, #e7e4dd);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 14px;
    }
    .hd-title {
      font-family: var(--c-font-display, serif);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--c-text, #1a1915);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .hd-loc {
      color: var(--c-text-muted, #6b6960);
      font-size: .95rem;
      display: inline-flex; align-items: center; gap: 5px;
      margin-bottom: 14px;
    }
    .hd-price {
      font-family: var(--c-font-display, serif);
      font-size: 2.1rem;
      font-weight: 800;
      color: var(--c-brand-deep, #064a33);
      line-height: 1;
    }
    .hd-price small {
      font-size: .82rem;
      font-weight: 500;
      color: var(--c-text-muted, #6b6960);
      margin-left: 4px;
    }
    .hd-min-months {
      margin-top: 8px;
      display: inline-flex; flex-wrap: wrap; align-items: center; gap: 4px;
      background: var(--c-brand-faint, #f0f7f2);
      color: var(--c-brand-deep, #064a33);
      border: 1px solid var(--c-brand-soft, #d9ecdf);
      padding: 6px 12px; border-radius: 10px;
      font-size: .86rem;
    }

    /* =====================================================================
       Rooms & specifications — premium spec tiles.
       Responsive auto-fill grid, SVG icons, tabular figures, subtle hover
       lift, and an accented "feature" tile for the room category. Degrades
       gracefully: only tiles with data are rendered.
       ===================================================================== */
    .hd-specs-card h3 { margin-bottom: 14px; }
    .hd-specs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 10px;
    }
    .hd-spec {
      position: relative;
      display: flex; flex-direction: column; gap: 9px;
      padding: 15px 16px;
      background: var(--c-bg-elev, #f4f3ee);
      border: 1px solid transparent;
      border-radius: 14px;
      transition: transform .18s ease, box-shadow .18s ease,
                  border-color .18s ease, background .18s ease;
    }
    .hd-spec__icon {
      width: 36px; height: 36px; border-radius: 11px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--c-surface, #fff);
      color: var(--c-brand, #0a6f4d);
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .hd-spec__icon svg { width: 19px; height: 19px; }
    .hd-spec__val {
      font-family: var(--c-font-display, serif);
      font-size: 1.32rem; font-weight: 700; line-height: 1.05;
      color: var(--c-text, #1a1915);
      font-variant-numeric: tabular-nums;
    }
    .hd-spec__val small { font-size: .82rem; font-weight: 600; color: var(--c-text-muted, #6b6960); }
    .hd-spec__lbl {
      font-size: .72rem; font-weight: 700; letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--c-text-muted, #6b6960);
    }
    .hd-spec:hover {
      transform: translateY(-2px);
      border-color: var(--c-brand-soft, #d9ecdf);
      background: var(--c-surface, #fff);
      box-shadow: 0 10px 22px rgba(10,111,77,.10);
    }
    /* Accented "feature" tile — used for the room category (single / master),
       the headline fact for room-by-room rentals. */
    .hd-spec--feature {
      background: linear-gradient(135deg, var(--c-brand, #0a6f4d), var(--c-brand-deep, #064a33));
      color: #fff;
    }
    .hd-spec--feature .hd-spec__icon { background: rgba(255,255,255,.18); color: #fff; box-shadow: none; }
    .hd-spec--feature .hd-spec__val  { color: #fff; }
    .hd-spec--feature .hd-spec__lbl  { color: rgba(255,255,255,.82); }
    .hd-spec--feature:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(10,111,77,.30);
      background: linear-gradient(135deg, var(--c-brand-deep, #064a33), #053b29);
    }
    @media (max-width: 480px) {
      .hd-specs { grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 8px; }
      .hd-spec { padding: 13px; }
      .hd-spec__val { font-size: 1.18rem; }
    }
    /* Subtle staggered entrance — eases the tiles up as the panel renders. */
    @keyframes hd-spec-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .hd-spec { animation: hd-spec-in .32s ease-out both; }
    .hd-spec:nth-child(1) { animation-delay: 0ms; }
    .hd-spec:nth-child(2) { animation-delay: 40ms; }
    .hd-spec:nth-child(3) { animation-delay: 80ms; }
    .hd-spec:nth-child(4) { animation-delay: 120ms; }
    .hd-spec:nth-child(5) { animation-delay: 160ms; }
    .hd-spec:nth-child(6) { animation-delay: 200ms; }
    .hd-spec:nth-child(7) { animation-delay: 240ms; }
    .hd-spec:nth-child(8) { animation-delay: 280ms; }
    @media (prefers-reduced-motion: reduce) {
      .hd-spec, .hd-spec--feature { transition: none; animation: none; }
      .hd-spec:hover, .hd-spec--feature:hover { transform: none; }
    }

    /* Generic content card */
    .hd-card {
      background: var(--c-surface, #fff);
      border: 1px solid var(--c-border, #e7e4dd);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 14px;
    }
    .hd-card h3 {
      color: var(--c-brand-deep, #064a33);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 12px;
    }
    .hd-card p { color: var(--c-text-soft, #3f3d36); line-height: 1.6; }

    /* Map */
    .hd-map { position: relative; height: 320px; border-radius: 12px; overflow: hidden; border: 1px solid var(--c-border, #e7e4dd); }

    /* Nearby-amenity toggle chips (overlaid on map). 10+ categories so we
       scroll horizontally instead of wrapping over half the map. */
    .hd-poi-toolbar {
      position: absolute; top: 10px; left: 10px; right: 70px;
      z-index: 10;
      display: flex; gap: 4px;
      overflow-x: auto; overflow-y: hidden;
      padding-bottom: 4px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .hd-poi-toolbar::-webkit-scrollbar { display: none; }
    .hd-poi-chip {
      flex-shrink: 0;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,.08);
      padding: 5px 10px;
      border-radius: 999px;
      font-size: .78rem; font-weight: 600;
      color: var(--c-text-soft, #3f3d36);
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      transition: background .12s ease, color .12s ease, transform .12s ease;
      white-space: nowrap;
    }
    .hd-poi-chip:active { transform: scale(.95); }
    .hd-poi-chip.active { background: var(--c-brand, #0a6f4d); color: #fff; border-color: var(--c-brand, #0a6f4d); }
    .hd-poi-chip.loading::after {
      content: ""; width: 8px; height: 8px; margin-left: 4px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%;
      animation: hd-spin .8s linear infinite;
    }
    @keyframes hd-spin { to { transform: rotate(360deg); } }
    .hd-poi-status {
      position: absolute; bottom: 10px; left: 10px;
      z-index: 10;
      background: rgba(0,0,0,.65); color: #fff;
      padding: 4px 10px; border-radius: 999px;
      font-size: .72rem;
      backdrop-filter: blur(6px);
      pointer-events: none;
    }

    /* Tiny POI marker pin (emoji-style) */
    .hd-poi-marker {
      position: relative;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,.96);
      border: 2px solid #0a6f4d;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: transform .12s ease;
    }
    .hd-poi-marker:hover { transform: translate(-50%, -50%) scale(1.18); z-index: 5; }
    /* The place's real name, always visible under the pin */
    .hd-poi-name {
      position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      margin-top: 3px; max-width: 132px; padding: 2px 7px;
      background: rgba(255,255,255,.95);
      border: 1px solid rgba(0,0,0,.14); border-radius: 7px;
      font: 600 10.5px/1.25 system-ui, sans-serif; color: #1a1915;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      box-shadow: 0 1px 4px rgba(0,0,0,.22);
      pointer-events: none;
    }
    .hd-poi-marker.cat-school    { border-color: #1e40af; }
    .hd-poi-marker.cat-hospital  { border-color: #b91c1c; }
    .hd-poi-marker.cat-market    { border-color: #bc5c00; }
    .hd-poi-marker.cat-transport { border-color: #6b3aa3; }

    /* POI popup styling */
    .hd-poi-popup { min-width: 160px; font-size: .85rem; }
    .hd-poi-popup strong { display: block; color: var(--c-brand-deep, #064a33); margin-bottom: 2px; }
    .hd-poi-popup .pp-meta { font-size: .75rem; color: var(--c-text-muted, #6b6960); }
    .hd-map-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .hd-map-actions a, .hd-map-actions button {
      flex: 1; min-width: 140px;
      padding: 10px 14px;
      background: var(--c-bg-elev, #f4f3ee);
      border: 1px solid var(--c-border, #e7e4dd);
      border-radius: 10px;
      font-weight: 600;
      font-size: .9rem;
      color: var(--c-text, #1a1915);
      text-decoration: none;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .hd-map-actions a:hover, .hd-map-actions button:hover { background: var(--c-brand-faint, #f0f7f2); border-color: var(--c-brand, #0a6f4d); text-decoration: none; }

    /* Nearest main road line */
    .hd-main-road {
      margin-top: 10px; padding: 9px 12px; border-radius: 9px;
      font-size: .86rem; line-height: 1.45;
      background: var(--c-bg-elev, #f4f3ee);
      border: 1px solid var(--c-border, #e7e4dd);
      color: var(--c-text, #1a1915);
    }
    .hd-main-road strong { color: var(--c-brand-deep, #064a33); }

    /* Commute / workplace distance tool */
    .hd-commute { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--c-border, #e7e4dd); }
    .hd-commute-label { display: block; font-weight: 700; font-size: .9rem; margin-bottom: 8px; color: var(--c-text, #1a1915); }
    .hd-commute-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .hd-commute-row input {
      flex: 1; min-width: 180px; padding: 10px 12px;
      border: 1px solid var(--c-border, #e7e4dd); border-radius: 10px;
      font-size: 16px; font-family: inherit; background: #fff; color: var(--c-text, #1a1915);
    }
    .hd-commute-row input:focus { outline: none; border-color: var(--c-brand, #0a6f4d); }
    .hd-commute-btn {
      padding: 10px 18px; background: var(--c-brand, #0a6f4d); color: #fff;
      border: none; border-radius: 10px; font-weight: 700; font-size: .9rem; cursor: pointer;
    }
    .hd-commute-btn:disabled { opacity: .6; cursor: default; }
    .hd-commute-msg { margin-top: 10px; font-size: .86rem; line-height: 1.45; padding: 9px 12px; border-radius: 9px; background: var(--c-bg-elev, #f4f3ee); color: var(--c-text, #1a1915); }
    .hd-commute-msg.ok   { background: #f0fdf4; border: 1px solid #86efac; color: #065f46; }
    .hd-commute-msg.warn { background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412; }
    .hd-commute-ctx  { color: var(--c-text-muted, #6b6960); font-weight: 400; }
    .hd-commute-note { display: block; margin-top: 3px; font-size: .76rem; color: var(--c-text-muted, #6b6960); }
    .hd-commute-results { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .hd-commute-result {
      display: grid; grid-template-columns: 1fr auto; gap: 2px 10px; align-items: center;
      text-align: left; padding: 8px 11px; background: #fff;
      border: 1px solid var(--c-border, #e7e4dd); border-radius: 10px; cursor: pointer; font-family: inherit;
    }
    .hd-commute-result:hover { border-color: var(--c-brand, #0a6f4d); background: var(--c-brand-faint, #f0f7f2); }
    .hd-commute-result.active { border-color: var(--c-brand, #0a6f4d); box-shadow: inset 0 0 0 1px var(--c-brand, #0a6f4d); }
    .hd-cr-name { font-weight: 700; font-size: .9rem; color: var(--c-text, #1a1915); }
    .hd-cr-meta { grid-column: 1; font-size: .76rem; color: var(--c-text-muted, #6b6960); }
    .hd-cr-km   { grid-column: 2; grid-row: 1 / span 2; font-weight: 800; color: var(--c-brand-deep, #064a33); font-size: .9rem; }
    .hd-work-marker {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      font-size: 17px; background: #fff; border: 2px solid #0a6f4d; border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }

    /* Amenities chips */
    .hd-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .hd-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 7px 14px;
      background: var(--c-brand-faint, #f0f7f2);
      color: var(--c-brand-deep, #064a33);
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 500;
    }

    /* Agent card */
    .hd-agent {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .hd-agent-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--c-brand, #0a6f4d);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      font-family: var(--c-font-display, serif);
      flex-shrink: 0;
    }
    .hd-agent-meta { flex: 1; min-width: 0; }
    .hd-agent-name { font-weight: 700; color: var(--c-text, #1a1915); font-size: 1rem; }
    .hd-agent-role { color: var(--c-text-muted, #6b6960); font-size: .82rem; }

    .hd-cta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }
    .hd-cta {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      text-decoration: none;
    }
    .hd-cta-call { background: var(--c-brand, #0a6f4d); color: #fff; }
    .hd-cta-wa   { background: #25D366; color: #fff; }
    .hd-cta-meet { background: var(--c-accent, #bc5c00); color: #fff; grid-column: span 2; }
    .hd-cta:active { transform: scale(.97); }
    .hd-cta:hover { text-decoration: none; opacity: .94; }

    /* Sticky bottom CTA bar (phones) */
    .hd-sticky {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--c-surface, #fff);
      border-top: 1px solid var(--c-border, #e7e4dd);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      z-index: 940;
      box-shadow: 0 -4px 16px rgba(0,0,0,.08);
    }
    .hd-sticky-inner {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      max-width: 600px;
      margin: 0 auto;
    }
    .hd-sticky .hd-cta { padding: 11px 8px; font-size: .85rem; min-height: 44px; }

    /* Loading / not-found states */
    .hd-state {
      text-align: center; padding: 80px 20px;
      background: var(--c-surface-soft, #fbfaf6);
      border: 1px dashed var(--c-border, #e7e4dd);
      border-radius: 16px;
      color: var(--c-text-muted, #6b6960);
    }
    .hd-state h3 { color: var(--c-text, #1a1915); margin-bottom: 8px; }

    @media (max-width: 700px) {
      .hd-wrap { padding-bottom: 100px; }
      .hd-hero { height: 240px; border-radius: 14px; }
      .hd-title { font-size: 1.3rem; }
      .hd-price { font-size: 1.7rem; }
      .hd-card  { padding: 16px; }
      .hd-header { padding: 16px; }
      .hd-sticky { display: block; }
      /* Hide the in-page CTAs on phones (sticky bar covers them) */
      .hd-cta-row-mobile-hide { display: none; }
    }
  </style>

  <!-- Plus Jakarta Sans — the property-detail (Twilight design) typeface -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
  <style>
    /* =====================================================================
       Twilight dark re-skin (Claude design) for the property detail page.
       Re-points the page's design tokens to the dark emerald palette so every
       .hd-* surface flips to the native dark look WITHOUT touching js/house.js.
       The page is a pushed-detail view: no top nav / bottom tab bar, just the
       back button + sticky CTA, like a real app screen.
       ===================================================================== */
    body[data-page="house"] {
      --c-surface: #141A18; --c-surface-soft: #0b1510; --c-bg-elev: rgba(255,255,255,.04);
      --c-border: rgba(255,255,255,.08);
      --c-text: #E9F3EE; --c-text-soft: rgba(233,243,238,.80); --c-text-muted: rgba(233,243,238,.55);
      --c-brand: #2EE6A6; --c-brand-deep: #2EE6A6; --c-brand-faint: rgba(46,230,166,.10); --c-brand-soft: rgba(46,230,166,.30);
      --c-accent: #F6C45A; --c-success: #2EE6A6; --c-danger: #ff8a7a;
      background: radial-gradient(1100px 760px at 50% -10%, #13241D 0%, #0a120e 60%, #050806 100%);
      color: #E9F3EE; font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
    }
    body[data-page="house"] .hd-wrap { max-width: 560px; padding-bottom: 120px; }
