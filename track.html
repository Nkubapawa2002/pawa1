<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Track — Pawa Bus Cargo</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a6f4d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="icons/icon-maskable.svg" />
    <link rel="icon" href="icons/icon-maskable.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/mobile.css" />
<!-- pawa-mobile-bundle -->
    <link rel="stylesheet" href="css/premium.css" />
  <link rel="stylesheet" href="css/claude-design.css" />
</head>
<body data-bg style="--page-bg:url('data/jalal-kelink-ugzSzSG7CFA-unsplash.jpg')" data-page="track">
  <div id="nav-slot"></div>

  <section class="page-hero" style="background-image:url('data/jalal-kelink-ugzSzSG7CFA-unsplash.jpg')">
    <div class="page-hero-inner">
      <h1 class="page-title" data-i18n="track_title">Track Your Parcel</h1>
      <p class="page-subtitle" data-i18n="track_sub">Choose how you'd like to find your order.</p>
    </div>
  </section>

  <main class="container" style="max-width:880px">

    <!-- Tabs -->
    <div class="track-tabs">
      <button class="track-tab active" data-tab="code" data-i18n="tab_code">By Tracking Code</button>
      <button class="track-tab" data-tab="sender" data-i18n="tab_sender">I'm the Sender</button>
      <button class="track-tab" data-tab="receiver" data-i18n="tab_receiver">I'm the Receiver</button>
    </div>

    <!-- Panel: Tracking Code -->
    <div class="track-panel active" id="panel-code">
      <div class="filter-bar">
        <input type="text" id="trackInput" data-i18n-placeholder="track_placeholder" placeholder="TZ-DAR-MWZ-..." />
        <button class="btn btn-primary" id="trackBtn" data-i18n="track_btn">Track</button>
      </div>
    </div>

    <!-- Panel: Sender -->
    <div class="track-panel" id="panel-sender">
      <div class="banner info" data-i18n="track_sender_hint">Enter sender info.</div>
      <div class="filter-bar" style="margin-top:12px">
        <input type="text" id="senderQuery" data-i18n-placeholder="track_search_placeholder" placeholder="Phone or name..." />
        <button class="btn btn-primary" id="senderBtn" data-i18n="track_search_btn">Search</button>
      </div>
    </div>

    <!-- Panel: Receiver -->
    <div class="track-panel" id="panel-receiver">
      <div class="banner info" data-i18n="track_receiver_hint">Enter receiver info.</div>
      <div class="filter-bar" style="margin-top:12px">
        <input type="text" id="receiverQuery" data-i18n-placeholder="track_search_placeholder" placeholder="Phone or name..." />
        <button class="btn btn-primary" id="receiverBtn" data-i18n="track_search_btn">Search</button>
      </div>
    </div>

    <div id="trackResult"></div>
  </main>

  <div id="footer-slot"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/tracking-id.js"></script>
  <script src="js/track.js"></script>
  <script>
    window.renderNav("track.html");
    window.renderFooter();
    window.applyTranslations();
    window.initTrackPage();
  </script>

    <script src="js/mobile-nav.js"></script>
    <script src="js/fab.js"></script>
    <script src="js/sw-register.js"></script>
<!-- pawa-mobile-bundle -->
  <script src="js/premium.js" defer></script>
</body>
</html>
