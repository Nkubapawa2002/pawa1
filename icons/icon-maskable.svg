<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Pawa app icon — maskable. Safe zone is the inner 80% (40px padding on each side). -->
  <rect width="512" height="512" fill="#0a6f4d"/>
  <g transform="translate(96 144)">
    <!-- Bus silhouette -->
    <rect x="0" y="0" width="320" height="180" rx="28" fill="#fcd116"/>
    <rect x="20" y="22" width="280" height="80" rx="12" fill="#0a6f4d"/>
    <!-- Windows -->
    <rect x="40" y="38" width="50" height="50" rx="6" fill="#bff5da"/>
    <rect x="100" y="38" width="50" height="50" rx="6" fill="#bff5da"/>
    <rect x="160" y="38" width="50" height="50" rx="6" fill="#bff5da"/>
    <rect x="220" y="38" width="60" height="50" rx="6" fill="#bff5da"/>
    <!-- Door -->
    <rect x="40" y="110" width="44" height="64" rx="6" fill="#0a6f4d"/>
    <!-- Wheels -->
    <circle cx="80" cy="200" r="34" fill="#111827"/>
    <circle cx="80" cy="200" r="14" fill="#fcd116"/>
    <circle cx="240" cy="200" r="34" fill="#111827"/>
    <circle cx="240" cy="200" r="14" fill="#fcd116"/>
  </g>
  <!-- Chat bubble overlay (signals AI / agent) -->
  <g transform="translate(330 60)">
    <circle cx="60" cy="60" r="60" fill="#fcd116"/>
    <text x="60" y="78" font-family="-apple-system,sans-serif" font-size="64" font-weight="800" text-anchor="middle" fill="#0a6f4d">P</text>
  </g>
</svg>
